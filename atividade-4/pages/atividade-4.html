<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox</title>
    <link rel="stylesheet" href="/atividade-4/css/style.css">
</head>
<body>
    <h1>Sandbox</h1>
    <p>Página usada para testar novas funcionalidades</p>

    <div id="audio">
        <h2>Áudio</h2>
        <audio preload="metadata" controls autoplay loop >
        <source src="/atividade-4/assets/audio/ls-theme-a.mp3" type="audio/mpeg">
            <p>
                Seu navegador não suporta áudio 
                <a href="/atividade-4/assets/audio/ls-theme-a.mp3" download="ls-theme-a.mp3" type="audio/mpeg"></a>
            </p>
        </audio>
    </div>

    <div id="video">
        <h2>Vídeo</h2>
        <iframe 
        width="550" 
        height="300" 
        src="https://www.youtube.com/embed/-A5gWiBeERI?si=UYkecYQeaqQBc-7l" 
        title="YouTube video player" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        referrerpolicy="strict-origin-when-cross-origin" 
        allowfullscreen>
        </iframe>
        <p>
            Jornalista faz campanha contra fake news e comenta desafios da profissão 
        </p>
    </div>
    

</body>
</html>
