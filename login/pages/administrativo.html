<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/administrativo.css">
</head>
<body>

    <div class="container py-4 ">
    <!-- container: centraliza o conteúdo e limita a largura da página
         py-4: adiciona padding em cima e embaixo (padding vertical) -->
        <div class="row mb-4 align-items-center">
        <!-- row: cria uma linha do grid do Bootstrap
             mb-4: adiciona margem embaixo
             align-items-center: centraliza os itens verticalmente -->
            <div class="col-12 col-md-8">
            <!-- col-12: em telas pequenas ocupa 100% da largura
                 col-md-8: em telas médias/grandes ocupa 8 colunas do grid (aprox. 66%) -->
                <h1 class="m-0">Painel Administrativo</h1>
                <!-- m-0: remove margens do título -->
            </div>

            <div class="col-12 col-md-4 text-md-end mt-2 mt-md-0">
            <!-- col-12: no celular ocupa toda a linha
                 col-md-4: no desktop ocupa 4 colunas (aprox. 33%)
                 text-md-end: no desktop o texto fica alinhado à direita
                 mt-2: no celular adiciona margem superior
                 mt-md-0: no desktop remove a margem superior -->
                <form action="/infrastructure/pages/index.html">
                    <button type="submit" class="btn btn-outline-light w-100">
                    <!--btn-outline-light: botão com borda branca e fundo transparente
                        w-100: faz o botão ocupar 100% da largura -->
                        Voltar para o Inicio
                    </button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm admin-card">
        <!-- card: cria um cartão Bootstrap
             shadow-sm: coloca uma sombra pequena
             admin-card: classe personalizada (CSS) -->
            <div class="card-body">
            <!-- card-body: área interna do card -->
                <h5 class="card-title mb-3">Lista de Usuários</h5>
                <!-- card-title: estilo padrão para título do card
                     mb-3: margem inferior -->
                <div class="table-responsive">
                <!-- table-responsive: permite rolagem horizontal no celular. Isso faz a tabela caber na tela pequena -->
                    <table class="table table-striped table-hover table-bordered align-middle text-center">
                    <!-- table: aplica estilo padrão Bootstrap na tabela
                         table-striped: cria linhas alternadas (zebra)
                         table-hover: muda a cor da linha quando passa o mouse
                         table-bordered: adiciona bordas na tabela
                         align-middle: centraliza verticalmente o conteúdo das células-->
                        <thead>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Ações</th>
                        </thead>

                                    </div>
                                    <!-- btn: estilo de botão Bootstrap
                                         btn-success: botão verde
                                         btn-sm: botão pequeno
                                         btn-danger: botão vermelho
                                         me-2: margem à direita (margin-end) -->
                                </td>
